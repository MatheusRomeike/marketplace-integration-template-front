<div class="app-brand-logo-container d-flex align-items-center" [class]="className"

  <img [src]="'/assets/images/logos/logo-market.svg'" alt="IntegrationTemplate"
    style="max-width: 100%; max-height: 48px; width: auto;" />

  </span>
  }
</div>
