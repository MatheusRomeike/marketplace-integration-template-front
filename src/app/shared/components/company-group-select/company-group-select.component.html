<div class="mb-3">
  @if (label) {
  <label class="form-label" [class.text-danger]="isInvalid">
    {{ label }} @if (required) { <span class="text-danger">*</span> }
  </label>
  }

  <ng-select
    [items]="groups"
    bindLabel="name"
    bindValue="id"
    [loading]="isLoading"
    [placeholder]="placeholder"
    [clearable]="false"
    [readonly]="isDisabled"
    [class.is-invalid]="isInvalid"
    [(ngModel)]="value"
    (ngModelChange)="onModelChange($event)"
    (blur)="onTouched()"
  >
    <!-- Label Template (Selected Item) -->
    <ng-template ng-label-tmp let-item="item">
      <div class="d-flex align-items-center gap-2">
        <app-avatar [nome]="item.name" size="avatar-xs"></app-avatar>
        <span class="text-truncate fw-medium">{{ item.name }}</span>
      </div>
    </ng-template>

    <!-- Option Template (Dropdown list) -->
    <ng-template ng-option-tmp let-item="item" let-index="index">
      <div class="d-flex align-items-center gap-3 py-1">
        <app-avatar [nome]="item.name" size="avatar-sm"></app-avatar>
        <div class="d-flex flex-column overflow-hidden">
          <span class="fw-medium text-heading text-truncate">{{ item.name }}</span>
          <span class="text-muted x-small">ID: {{ item.externalId }}</span>
        </div>
      </div>
    </ng-template>
  </ng-select>

  @if (isInvalid) {
  <div class="invalid-feedback d-block animate__animated animate__fadeIn">
    Selecione um grupo de empresa
  </div>
  }
</div>
