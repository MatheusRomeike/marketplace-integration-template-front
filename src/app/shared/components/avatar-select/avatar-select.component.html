<ng-template #template>
  <div class="modal-header pt-3">
    <h3 class="modal-title mb-0">Alterar avatar</h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modalRef.dismiss()"
    ></button>
  </div>
  <div class="modal-body">
    @if (imageChangedEvent) {
    <div class="row mb-5">
      <div class="col-lg-12">
        <image-cropper
          [imageChangedEvent]="imageChangedEvent"
          [maintainAspectRatio]="false"
          [aspectRatio]="1 / 1"
          format="png"
          (imageCropped)="imageCropped($event)"
          [output]="'base64'"
          [(transform)]="transform"
        >
        </image-cropper>
      </div>
    </div>
    } @else {
    <label
      for="file-crop"
      class="cursor-pointer flex-column w-100 h-px-300 d-flex align-items-center justify-content-center rounded border"
      style="border-style: dashed !important"
    >
      <i class="ti ti-photo-scan text-light mb-3" style="font-size: 70px"></i>
      <span class="fw-bold">Clique para selecionar uma imagem</span>
      <small class="text-muted">Escolha a imagem e recorte para melhor visualização.</small>
      <input
        type="file"
        class="d-none"
        id="file-crop"
        name="file-crop"
        accept=".jpg, .png, .jpeg"
        (change)="fileChangeEvent($event)"
      />
    </label>
    }

    <div class="row mt-3">
      @if (imageChangedEvent) {
      <div class="col-lg-12 d-flex justify-content-between">
        <div>
          <button class="btn btn-label-secondary me-2" (click)="zoomIn()">
            <i class="ti ti-plus me-1"></i>Zoom
          </button>
          <button class="btn btn-label-secondary me-2" (click)="zoomOut()">
            <i class="ti ti-minus me-1"></i>Zoom
          </button>
        </div>
        <div>
          <button class="btn btn-label-secondary me-3" (click)="reset()">Cancelar</button>
          <app-submit
            text="Confirmar"
            submitClass="btn btn-primary"
            [inLoad]="load"
            [disabled]="load"
            (click)="confirmar()"
          ></app-submit>
        </div>
      </div>
      }
    </div>
  </div>
</ng-template>
