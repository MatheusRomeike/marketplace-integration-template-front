<app-page-header title="Grupos de Empresas" subtitle="Gerencie os grupos de empresas do sistema" [showBack]="false"
  [breadcrumbs]="breadcrumbs" saveLabel="Novo Grupo" saveIcon="ti ti-plus" saveUrl="/grupos-empresas/novo">
</app-page-header>

<div class="card shadow-none pb-3 border-0 animate__animated animate__fadeIn">
  <div class="card-header d-flex align-items-center justify-content-between py-3 px-4">
    <div class="d-flex align-items-center">
      <i class="ti ti-list-details ti-md me-2 text-primary"></i>
      <h5 class="card-title mb-0 fw-bold">Listagem de Grupos</h5>
    </div>
    <div class="d-flex align-items-center gap-2">
      <div class="input-group input-group-merge shadow-none search-input-group">
        <span class="input-group-text border-light bg-light py-0"><i class="ti ti-search text-muted"></i></span>
        <input type="text" class="form-control border-light bg-light" placeholder="Pesquisar grupos..."
          (input)="onSearch($event)">
      </div>
    </div>
  </div>

  @if (isLoading) {
  <div class="card-body text-center py-5">
    <div class="spinner-border text-primary spinner-border-sm" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
    <div class="mt-2 text-muted small">Buscando dados do servidor...</div>
  </div>
  } @else if (companyGroups.length === 0) {
  <div class="card-body text-center py-5">
    <app-empty-state title="Nenhum grupo encontrado"
      description="Você ainda não possui grupos de empresas cadastrados no sistema." buttonText="Criar Primeiro Grupo"
      [buttonLink]="['/grupos-empresas/novo']" buttonIcon="ti ti-plus">
    </app-empty-state>
  </div>
  } @else {
  <div class="table-responsive">
    <table id="table-groups" class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th class="ps-4 py-3 text-uppercase fw-bold text-muted">Informações do Grupo</th>
          <th class="py-3 text-uppercase fw-bold text-muted">Identificador</th>
          <th class="py-3 text-uppercase fw-bold text-muted text-center no-sort">Status</th>
          <th class="pe-4 py-3 text-center text-uppercase fw-bold text-muted no-sort">Ações</th>
        </tr>
      </thead>
      <tbody class="table-border-bottom-0">
        @for (group of companyGroups; track group.id) {
        <tr>
          <td class="ps-4 py-3">
            <div class="d-flex align-items-center gap-3">
              <div>
                <app-avatar [nome]="group.name"></app-avatar>
              </div>
              <div class="d-flex flex-column">
                <span class="text-truncate fw-medium">{{ group.name }}</span>
              </div>
            </div>
          </td>
          <td class="py-3">
            <code class="px-2 py-1 rounded bg-lighter text-primary fw-semibold small">
                {{ group.externalId }}
              </code>
          </td>
          <td class="py-3 text-center">
            <span class="badge bg-label-success px-3">Ativo</span>
          </td>
          <td class="pe-4 py-3 text-center">
            <div class="d-flex justify-content-center gap-1">
              <button type="button" class="btn btn-sm btn-icon btn-text-primary rounded-circle" title="Editar"
                [routerLink]="['/grupos-empresas/editar', group.id]">
                <i class="ti ti-edit fs-4"></i>
              </button>
              <button type="button" class="btn btn-sm btn-icon btn-text-danger rounded-circle" title="Excluir"
                (click)="onDelete(group)">
                <i class="ti ti-trash fs-4"></i>
              </button>
            </div>
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
  }
</div>
